version: '3.8'

services:
  api:
    build:
      context: ./dpp-api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - api-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./dpp-web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://api:3001/api/v1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
