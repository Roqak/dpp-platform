version: '3.8'

services:
  api:
    build:
      context: ./dpp-api
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    environment:
      - PORT=3011
      - NODE_ENV=production
    volumes:
      - api-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./dpp-web
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - NUXT_PUBLIC_API_BASE=http://api:3011/api/v1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
